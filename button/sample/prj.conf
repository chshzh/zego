#
# Zego button sample — manual hardware test harness.
#
# Build:
#   nrfutil sdk-manager toolchain launch --ncs-version=v3.3.0 -- \
#     west build -b nrf7002dk/nrf5340/cpuapp -p zego/button/sample
#
#   nrfutil sdk-manager toolchain launch --ncs-version=v3.3.0 -- \
#     west build -b nrf54lm20dk/nrf54lm20a/cpuapp -p zego/button/sample
#
# Flash:
#   nrfutil sdk-manager toolchain launch --ncs-version=v3.3.0 -- \
#     west flash -d zego/button/sample/build --dev-id <SN>

CONFIG_ZEGO_BUTTON=y

# Show press/release debug lines as well as gesture INFO lines.
CONFIG_ZEGO_BUTTON_LOG_LEVEL_DBG=y

CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3

# Tune these to experiment with timing sensitivity:
# CONFIG_ZEGO_BUTTON_DOUBLE_CLICK_WINDOW_MS=400
# CONFIG_ZEGO_BUTTON_LONG_PRESS_MS=3000
