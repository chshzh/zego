# nRF54LM20DK — 4 user buttons (BUTTON0–BUTTON3).
#
# When building with -DSHIELD=nrf7002eb2 the shield occupies the BUTTON3 pin,
# so BUTTON3 is physically unavailable in that configuration.  That is an
# application-level constraint: the button module always tracks all 4 buttons;
# the application (e.g. nordic-wifi-webdash) overrides to NUM_BUTTONS=3 in its
# own boards/<board>.conf when the shield is present.
CONFIG_ZEGO_BUTTON_NUM_BUTTONS=4
