#
# Zego LED sample — manual hardware test harness.
#
# Build:
#   nrfutil sdk-manager toolchain launch --ncs-version=v3.3.0 -- \
#     west build -b nrf7002dk/nrf5340/cpuapp -p \
#     -d zego/led/sample/build_7002dk zego/led/sample
#
#   nrfutil sdk-manager toolchain launch --ncs-version=v3.3.0 -- \
#     west build -b nrf54lm20dk/nrf54lm20a/cpuapp -p \
#     -d zego/led/sample/build_54lm20dk zego/led/sample
#
# Flash:
#   nrfutil sdk-manager toolchain launch --ncs-version=v3.3.0 -- \
#     west flash -d zego/led/sample/build_7002dk --dev-id <SN>

CONFIG_ZEGO_LED=y

# Show state-change debug lines as well as step INFO lines.
CONFIG_ZEGO_LED_LOG_LEVEL_DBG=y

CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3

# Tune these to experiment with effect timing:
# CONFIG_ZEGO_LED_BLINK_PERIOD_MS=250
# CONFIG_ZEGO_LED_BREATHE_PERIOD_MS=3000
# CONFIG_ZEGO_LED_BREATHE_PWM_PERIOD_MS=20
# CONFIG_ZEGO_LED_MARQUEE_PERIOD_MS=300
