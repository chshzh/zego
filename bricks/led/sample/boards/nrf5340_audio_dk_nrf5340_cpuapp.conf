# nRF5340 Audio DK — 9 LEDs
# Index mapping:
#   0-2 → RGB1 (led_0/1/2, PWM-capable)
#   3-5 → RGB2 (led_3/4/5)
#   6   → mono blue  (led_6)
#   7-8 → mono green (led_7/8)
# Marquee restricted to RGB1 (indices 0-2) so it cycles the RGB triplet only.
CONFIG_ZEGO_LED_NUM_LEDS=9
CONFIG_ZEGO_LED_ROTATE_NUM_LEDS=3
CONFIG_ZEGO_LED_BACKEND_DK=y
