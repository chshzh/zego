# nRF7002 DK — 2 user LEDs (LED1 = index 0, LED2 = index 1)
CONFIG_ZEGO_LED_NUM_LEDS=2
CONFIG_ZEGO_LED_BACKEND_DK=y
# To use the Zephyr LED driver backend (required for hardware-PWM breathe):
#   CONFIG_ZEGO_LED_BACKEND_ZEPHYR=y
#   CONFIG_ZEGO_LED_USE_PWM=y
#   CONFIG_ZEGO_LED_0_PWM_INDEX=0   # LED0 → pwm-leds child index 0 (pwm_led_0)
#   CONFIG_ZEGO_LED_1_PWM_INDEX=-1  # LED1 → GPIO only, software PWM fallback
