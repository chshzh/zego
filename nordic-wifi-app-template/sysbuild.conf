# Wi-Fi support
SB_CONFIG_WIFI_NRF70=y
# Partition Manager deprecated after NCS v3.3.0
SB_CONFIG_PARTITION_MANAGER=n

# nRF5340 (nrf7002dk) only: BLE controller runs on the network core over IPC.
# Build the upstream Zephyr hci_ipc sample as the netcore image so
# CONFIG_ZEGO_WIFI_BLE_PROV can open the HCI driver.
# On nrf54lm20dk SUPPORT_NETCORE=n (single-core SoC), so this has no effect.
SB_CONFIG_NETCORE_HCI_IPC=y
