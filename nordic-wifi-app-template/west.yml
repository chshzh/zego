manifest:
  version: "0.13"

  defaults:
    remote: ncs

  remotes:
    - name: ncs
      url-base: https://github.com/nrfconnect
    - name: chshzh
      url-base: https://github.com/chshzh

  projects:
    # NCS v3.4.0 — imports zephyr, bootloader, modules, nrfxlib, tools, etc.
    - name: sdk-nrf
      path: nrf
      revision: v3.4.0
      import: true
      remote: ncs
      
    # Common app modules and libraries
    - name: zego
      path: zego
      revision: v3.4.0.0
      remote: chshzh

    # Add more sibling projects as needed:
    # - name: nordic-wifi-webdash
    #   path: nordic-wifi-webdash
    #   revision: main
    #   remote: chshzh

    # - name: nordic-wifi-audio
    #   path: nordic-wifi-audio
    #   revision: main
    #   remote: chshzh

    # - name: claude
    #   path: .claude
    #   revision: main
    #   remote: chshzh
    
    - name: zview
      url: https://github.com/chshzh/zview
      revision: main
      path: modules/tools/zview
      west-commands: scripts/west-commands.yml
    

  self:
    path: nordic-wifi-memfault
