#
# hci_ipc network-core configuration for nRF5340 CPUNET.
#
CONFIG_IPC_SERVICE=y
CONFIG_MBOX=y
CONFIG_HEAP_MEM_POOL_SIZE=8192
CONFIG_MAIN_STACK_SIZE=512
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=512
CONFIG_BT=y
CONFIG_BT_HCI_RAW=y
CONFIG_BT_MAX_CONN=2

# ACL buffer sizes tuned for nRF Wi-Fi Provisioner MTU (147 bytes L2CAP).
# Must match BT_BUF_ACL_RX_SIZE / BT_BUF_ACL_TX_SIZE in zego/wifi_ble_prov
# Kconfig.defaults.
CONFIG_BT_BUF_ACL_RX_SIZE=151
CONFIG_BT_BUF_ACL_TX_SIZE=151

# Suppress Kconfig warnings when the wifi-p2p snippet is active:
# the snippet sets these symbols globally but they are meaningless on the
# net core (no WiFi stack here).  Explicitly clear them so Kconfig does not
# warn about unsatisfied dependencies.
CONFIG_WIFI_NM_WPA_SUPPLICANT_P2P=n
CONFIG_NRF70_AP_MODE=n
CONFIG_NRF70_P2P_MODE=n
