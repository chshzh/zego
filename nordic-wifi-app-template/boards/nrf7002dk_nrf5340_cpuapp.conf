# ============================================================================
# nRF7002DK: 2 user buttons (SW0 = Button 1, SW1 = Button 2), 2 LEDs
# ============================================================================
CONFIG_ZEGO_BUTTON_NUM_BUTTONS=2
CONFIG_ZEGO_BUTTON_BACKEND_DK=y
CONFIG_ZEGO_LED_NUM_LEDS=2
CONFIG_ZEGO_LED_BACKEND_DK=y

# ============================================================================
# nRF7002DK: BLE provisioning support
# ============================================================================
# BLE provisioning does not fit on nRF7002DK (nRF5340, 1 MB flash) when
# a heavy application is also present.  Enable it only if you have enough
# flash headroom; otherwise leave it disabled here and rely on the
# wifi connect / wifi cred shell options for STA provisioning.
# Remove or override this line to re-enable on nRF7002DK.
CONFIG_ZEGO_WIFI_BLE_PROV=n

# ============================================================================
# Memory / Stack sizes — nRF7002DK measurements
# All values measured on nRF7002DK using CONFIG_THREAD_ANALYZER.
# Sizing rule: max_hwm / 0.9 (10 % headroom). Heap: max_hwm / 0.8 (20 % headroom).
# Override prj.conf values which were measured on nRF54LM20DK + nRF7002EB2.
# ============================================================================
# Watermark Bytes 7880/0.9=8755
CONFIG_WIFI_NM_WPA_SUPPLICANT_THREAD_STACK_SIZE=8755
# Watermark Bytes 3552/0.9=3946
CONFIG_WIFI_NM_WPA_SUPPLICANT_WQ_STACK_SIZE=3946
# Watermark Bytes 4560/0.9=5066
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=5066
# Watermark Bytes 1168/0.9=1297
CONFIG_NRF70_BH_WQ_STACK_SIZE=1297
# Watermark Bytes 792/0.9=880
CONFIG_NRF70_IRQ_WQ_STACK_SIZE=880
# Watermark Bytes 88128/0.8=110160
CONFIG_HEAP_MEM_POOL_SIZE=110160

# ============================================================================
# nRF7002DK: Silence the  "MBEDTLS_PSA_CRYPTO_EXTERNAL_RNG_ALLOW_NON_CSPRNG" build warning
# ============================================================================
# Silence the v3.3.0 Kconfig warning:
#   "MBEDTLS_PSA_CRYPTO_EXTERNAL_RNG_ALLOW_NON_CSPRNG was assigned the value
#    'y' but got the value 'n'"
# The nrf7002dk_nrf5340_cpuapp_defconfig sets this symbol to 'y'.
# NRF_SECURITY selects DISABLE_MBEDTLS_BUILTIN and sets
# MBEDTLS_CFG_FILE="nrf-config.h", making the Kconfig.mbedtls menu
# (depends on MBEDTLS_BUILTIN && MBEDTLS_CFG_FILE="config-mbedtls.h")
# invisible.  The dependency is therefore unmet.  Explicitly clearing the
# symbol here overrides the defconfig assignment so the assigned value ('n')
# matches the evaluated value ('n').
#
# A related warning ("The choice symbol MBEDTLS_PSA_CRYPTO_EXTERNAL_RNG was
# selected (set =y) but no symbol ended up as the choice selection") also
# originates from the board defconfig and cannot be silenced at the app
# level: kconfiglib does not honour "# CONFIG_CHOICE_SYMBOL is not set" for
# choice symbols, so the defconfig's choice assignment persists.  This is a
# known upstream issue (NRF_SECURITY overrides the choice via CMake, but the
# Kconfig layer is left inconsistent).  The warning is harmless; nrf_security
# always provides its own RNG implementation regardless of this choice.
# ============================================================================
# CONFIG_MBEDTLS_PSA_CRYPTO_EXTERNAL_RNG_ALLOW_NON_CSPRNG is not set