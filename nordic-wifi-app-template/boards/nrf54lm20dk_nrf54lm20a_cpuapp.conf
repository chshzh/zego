# nRF54LM20DK: 3 user buttons (BUTTON0/1/2), 4 LEDs
# 2 MB flash — BLE provisioning enabled (CONFIG_ZEGO_WIFI_BLE_PROV=y from prj.conf)
CONFIG_ZEGO_WIFI_BLE_PROV_LOG_LEVEL_INF=y
CONFIG_BT_WIFI_PROV_LOG_LEVEL_INF=y
CONFIG_ZEGO_BUTTON_NUM_BUTTONS=3
CONFIG_ZEGO_BUTTON_BACKEND_DK=y
CONFIG_ZEGO_LED_NUM_LEDS=4
CONFIG_ZEGO_LED_BACKEND_DK=y

# BT RX WQ needs extra stack for wifi_prov indication/notification callbacks
# Max usage 20072/0.9=22302
CONFIG_BT_RX_STACK_SIZE=22302
# Max usage 1784/0.9=1982
CONFIG_BT_LONG_WQ_STACK_SIZE=1982