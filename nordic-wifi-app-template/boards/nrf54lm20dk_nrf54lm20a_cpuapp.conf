# =========================================================================
# Configuration coverage priority:
# Command line > Overlay files > project boards/<board>.conf > prj.conf > Board defconfig
# (highest)                                                              (lowest)
# =========================================================================

# =========================================================================
# This file contains only:
#   - System-level configuration that belongs to no single module
#   - Module enable/disable flags
#   - Log-level choices (cannot be set via Kconfig.defaults)
#   - Project-specific overrides that differ from module defaults
#   - Shared cross-module settings (TLS, mbedTLS)
#   - Hardware-specific memory and stack tuning
# Module-specific defaults live in each module's Kconfig.defaults file.
# =========================================================================

# =========================================================================
# prj.conf should contain the following sections, if needed, in this order,
# with the given headings. Config values that already match the Kconfig
# default (or are already selected transitively) should be commented out.
# Top-level section headings use "=" bars; sub-sections within a section
# use "-" bars:
# =========================================================================
# Document versions — keep in sync with docs/pm-prd/PRD.md and docs/dev-specs/overview.md Changelog timestamps
# General System Configuration - General system configuration
# ZEGO Module: button/led/wifi/network - configurations for different Zego modules
# APP  Module: app/ntp/app_http/app_mqtt - configurations for different APP modules
# Thread Stack Configuration - Thread stack configuration
# Heap Configuration - Heap configuration   
# mbedTLS - mbedTLS configuration
# Shell - shell configuration
# Logging Configuration
# Optimization - Optimization configuration
# =========================================================================
# Reminder: this header block (down to this line) should be copied verbatim
# into any new prj.conf-style config file (e.g. new boards/*.conf files) so
# the same section order and bar conventions are followed consistently.
# =========================================================================

# =========================================================================
# ZEGO Module: button/led/wifi_prov - configurations for different Zego modules
# =========================================================================

# -------------------------------------------------------------------------
# button
# -------------------------------------------------------------------------
CONFIG_ZEGO_BUTTON_NUM_BUTTONS=3
# CONFIG_ZEGO_BUTTON_BACKEND_DK already the brick's default choice.
# CONFIG_ZEGO_BUTTON_BACKEND_DK=y

# -------------------------------------------------------------------------
# led
# -------------------------------------------------------------------------
# CONFIG_ZEGO_LED_NUM_LEDS already defaults to 4 in zego/led's Kconfig.
# CONFIG_ZEGO_LED_NUM_LEDS=4
# CONFIG_ZEGO_LED_BACKEND_DK already the brick's default choice.
# CONFIG_ZEGO_LED_BACKEND_DK=y

# -------------------------------------------------------------------------
# wifi_ble_prov
# -------------------------------------------------------------------------
CONFIG_ZEGO_WIFI_BLE_PROV=y
CONFIG_ZEGO_WIFI_BLE_PROV_LOG_LEVEL_INF=y
CONFIG_BT_WIFI_PROV_LOG_LEVEL_INF=y
# BT RX WQ needs extra stack for wifi_prov indication/notification callbacks
# Watermark Bytes 20072/0.9=22302
CONFIG_BT_RX_STACK_SIZE=22302
# Watermark Bytes 1984/0.9=2230
CONFIG_BT_LONG_WQ_STACK_SIZE=2230

# =========================================================================
# Shell - shell configuration
# =========================================================================
# NET_SHELL cost: +49.8 KB Flash / +1.4 KB RAM (measured Jun 17 2026)
# Enable only when debugging with net iface / net sockets / net ping / etc.
CONFIG_NET_SHELL=y
# OBJ_CORE cost: +12.7 KB Flash / +11.8 KB RAM (measured Jun 17 2026, on top of NET_SHELL)
# Enables socket Creator/Name/Lifetime columns in 'net sockets'
#CONFIG_OBJ_CORE=y
#CONFIG_NET_SOCKETS_OBJ_CORE=y

# =========================================================================
# Thread Stack Configuration - nRF54LM20DK measurements
# =========================================================================
# All values measured on nRF54LM20DK using CONFIG_THREAD_ANALYZER.
# Sizing rule: max_hwm / 0.9 (10 % headroom). Override prj.conf values which
# were measured on nRF54LM20DK + nRF7002EB2.
# =========================================================================
# Watermark Bytes 8312/0.9=9235
CONFIG_WIFI_NM_WPA_SUPPLICANT_THREAD_STACK_SIZE=9235
# Watermark Bytes 3600/0.9=4000
CONFIG_WIFI_NM_WPA_SUPPLICANT_WQ_STACK_SIZE=4000
# Watermark Bytes 4560/0.9=5066
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=5066
# Watermark Bytes 1512/0.9=1680
CONFIG_NRF70_BH_WQ_STACK_SIZE=4096
# Watermark Bytes 792/0.9=880
CONFIG_NRF70_IRQ_WQ_STACK_SIZE=880

# =========================================================================
# Heap Configuration - nRF54LM20DK measurements
# =========================================================================
# Heap: max_hwm / 0.8 (20 % headroom).
# Watermark Bytes 88248/0.8=110310
CONFIG_HEAP_MEM_POOL_SIZE=110310
