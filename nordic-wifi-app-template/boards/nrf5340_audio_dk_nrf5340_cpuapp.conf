# nRF5340 Audio DK + nRF7002EK
#   5 user buttons (DK bitmask order):
#     0 → VOL-       (KEY_VOLUMEDOWN)
#     1 → VOL+       (KEY_VOLUMEUP)
#     2 → PLAY/PAUSE (KEY_3)
#     3 → BTN4       (KEY_4)
#     4 → BTN5       (KEY_5)
#   9 LEDs:
#     0-2 → RGB1  (led_0/1/2, PWM-capable)
#     3-5 → RGB2  (led_3/4/5)
#     6   → mono blue  (led_6)
#     7-8 → mono green (led_7/8)
#   ROTATE restricted to RGB1 (indices 0-2) via CONFIG_ZEGO_LED_ROTATE_NUM_LEDS=3
#
CONFIG_ZEGO_BUTTON_NUM_BUTTONS=5
CONFIG_ZEGO_BUTTON_BACKEND_DK=y
CONFIG_ZEGO_LED_NUM_LEDS=9
CONFIG_ZEGO_LED_ROTATE_NUM_LEDS=3
CONFIG_ZEGO_LED_BACKEND_DK=y

# BLE provisioning disabled: combined flash of BLE host stack + P2P snippet + app
# exceeds the 1 MB flash limit on the nRF5340 Audio DK. Re-enable here if the
# application build is lean enough to fit.
CONFIG_ZEGO_WIFI_BLE_PROV=n
