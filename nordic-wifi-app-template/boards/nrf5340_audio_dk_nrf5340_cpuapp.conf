# nRF5340 Audio DK + nRF7002EK
#   5 user buttons (DK bitmask order):
#     0 → VOL-       (KEY_VOLUMEDOWN)
#     1 → VOL+       (KEY_VOLUMEUP)
#     2 → PLAY/PAUSE (KEY_3)
#     3 → BTN4       (KEY_4)
#     4 → BTN5       (KEY_5)
#   9 LEDs:
#     0-2 → RGB1  (led_0/1/2, PWM-capable)
#     3-5 → RGB2  (led_3/4/5)
#     6   → mono blue  (led_6)
#     7-8 → mono green (led_7/8)
#   UX ROTATE uses RGB2 only (indices 3-5) via CONFIG_APP_UX_ROTATE_FIRST_LED/COUNT
#
CONFIG_ZEGO_BUTTON_NUM_BUTTONS=5
CONFIG_ZEGO_BUTTON_BACKEND_DK=y
CONFIG_ZEGO_LED_NUM_LEDS=9
CONFIG_ZEGO_LED_BACKEND_DK=y

# UX module: rotate RGB2 (LEDs 3, 4, 5) during connecting; solid green (LED 4) when connected.
CONFIG_APP_UX_ROTATE_FIRST_LED=3
CONFIG_APP_UX_ROTATE_COUNT=3
CONFIG_APP_UX_CONNECTED_LED=4
CONFIG_APP_UX_CONNECTED_LED_GREEN_ONLY=y

# BLE provisioning disabled: combined flash of BLE host stack + P2P snippet + app
# exceeds the 1 MB flash limit on the nRF5340 Audio DK. Re-enable here if the
# application build is lean enough to fit.
CONFIG_ZEGO_WIFI_BLE_PROV=n

# WPA supplicant thread stack: override prj.conf value (calibrated on nRF54LM20DK).
# On nRF5340 Audio DK, wpas_p2p_update_channel_list allocates two struct p2p_channels
# (~2048 B combined) on the stack at WiFi COMPLETED, overflowing the 5991 B limit.
# Peak not yet measured — set to 8192 until a Thread Analyzer run is done on this board.
CONFIG_WIFI_NM_WPA_SUPPLICANT_THREAD_STACK_SIZE=8192
