# Shared optional profile for nRF5340-based boards (nRF7002DK and nRF5340 Audio DK):
# enable BLE provisioning while keeping P2P disabled.
# Intended for tighter flash budgets where the wifi-p2p snippet is not used.
CONFIG_ZEGO_WIFI_BLE_PROV=y

# BT RX WQ needs extra stack for wifi_prov indication/notification callbacks
# Watermark Bytes 20072/0.9=22302
CONFIG_BT_RX_STACK_SIZE=22302
# Watermark Bytes 1784/0.9=1982
CONFIG_BT_LONG_WQ_STACK_SIZE=1982