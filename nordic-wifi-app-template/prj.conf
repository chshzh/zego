# =========================================================================
# Thread Stack Configuration - Thread stack configuration
# =========================================================================
# All values measured on nRF54LM20DK + nRF7002EB2 using CONFIG_THREAD_ANALYZER.
# Sizing rule: max_hwm / 0.9 (10 % headroom). Adjust for your application load.
# Watermark Bytes 1496/0.9=1662 (WiFi reconnect + active uploads)
CONFIG_MAIN_STACK_SIZE=4096
# Watermark Bytes 4952/0.9=5502 (wpa_cli_cmd + _wpa_ctrl_command + zvfs_poll_internal)
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=5502
# Watermark Bytes 4432/0.9=4924
CONFIG_NET_CONNECTION_MANAGER_MONITOR_STACK_SIZE=4924
# Watermark Bytes 1168/0.9=1297; kept at 2048 for network burst headroom
CONFIG_NET_RX_STACK_SIZE=2048
# Watermark Bytes 792/0.9=880; kept at 2048 for network burst headroom
CONFIG_NET_TX_STACK_SIZE=2048
# Watermark Bytes 2940/0.9=3266
CONFIG_NET_MGMT_EVENT_STACK_SIZE=3266
# Watermark Bytes 5392/0.9=5991 (measured on nRF54LM20DK + nRF7002EB2)
CONFIG_WIFI_NM_WPA_SUPPLICANT_THREAD_STACK_SIZE=8192
# Watermark Bytes 3896/0.9=4328
CONFIG_WIFI_NM_WPA_SUPPLICANT_WQ_STACK_SIZE=4328
# Watermark Bytes 1088/0.9=1208
CONFIG_NRF70_BH_WQ_STACK_SIZE=1208
# Watermark Bytes 792/0.9=880
CONFIG_NRF70_IRQ_WQ_STACK_SIZE=880
# Watermark Bytes 248/0.9=276
CONFIG_L2_WIFI_CONN_WQ_STACK_SIZE=2760

CONFIG_SHELL_STACK_SIZE=8192

# =========================================================================
# Heap Configuration - Heap configuration
# =========================================================================
# CONFIG_HEAP_MEM_POOL_SIZE is the user floor. Kconfig enforces a minimum equal
# to the sum of all HEAP_MEM_POOL_ADD_SIZE_* values (~184 KB for Wi-Fi + BLE):
#   ADD_SIZE_NRF70=150000  ADD_SIZE_HOSTAP=30000  ADD_SIZE_BOARD=4096  ADD_SIZE_POSIX=256
# Setting a value below that sum is silently raised to the sum unless
# HEAP_MEM_POOL_IGNORE_MIN=y is set.
# Runtime measurements: _system_heap peaked at 57928 B (89 %) of the previous
# 64780 B ceiling in STA/SoftAP mode. P2P_GO adds ~6-8 KB more for struct
# p2p_data, the P2P GO's wpa_auth context, and the PMKSA cache (528 B).
# Without enough headroom, pmksa_cache_auth_init() returns NULL, causing
# "PMKSA cache initialization failed" + "WPA initialization failed" and a
# 15 s WPS_CHECK_PIN ctrl-iface timeout.
# New ceiling: 131072 B (20 % headroom above estimated P2P_GO peak of ~104 KB).
# With NRF_WIFI_GLOBAL_HEAP=n and WIFI_NM_WPA_SUPPLICANT_GLOBAL_HEAP=n the
# HEAP_MEM_POOL_ADD_SIZE_* contributions from WiFi + WPA supplicant are removed.
# Only app-level allocations remain in _system_heap — re-measure after split.
CONFIG_HEAP_MEM_POOL_SIZE=4096
CONFIG_HEAP_MEM_POOL_IGNORE_MIN=y
# WiFi driver moved to dedicated K_HEAPs — visible as wifi_drv_ctrl_mem_pool and
# wifi_drv_data_mem_pool in ZView.
# Re-measure ZView watermarks after a full STA/P2P connect + TLS cycle, then set
# each to watermark / 0.8.
CONFIG_NRF_WIFI_GLOBAL_HEAP=n
CONFIG_NRF_WIFI_CTRL_HEAP_SIZE=16384
CONFIG_NRF_WIFI_DATA_HEAP_SIZE=40960
# WPA supplicant moved to dedicated K_HEAP — visible as wifi_nm_wpa_supplicant_mem_pool in ZView.
# Re-measure ZView watermark after a full connect cycle, then set to peak / 0.8.
# Use the shared Zephyr system heap for wpa_supplicant (the NCS default, =y).
# A dedicated supplicant K_HEAP (=n) was previously used for per-pool ZView
# monitoring, but it starved the P2P_GO hostapd WPS Registrar: wps_registrar_init()
# failed ("Failed to initialize WPS Registrar") and the GO AP interface never
# reached AP-ENABLED, so P2P pairing was impossible. The nRF P2P sample uses the
# global heap and works; matching it fixes the GO. Confirmed on hardware.
# (Trade-off: the supplicant heap no longer appears as a separate ZView pool;
# track it via the system-heap watermark instead.)
CONFIG_WIFI_NM_WPA_SUPPLICANT_GLOBAL_HEAP=y

# =========================================================================
# mbedTLS - mbedTLS configuration
# =========================================================================
CONFIG_MBEDTLS_ENABLE_HEAP=y
# Watermark Bytes 69504/0.8=86880 (measured with global heap; re-measure with dedicated heap)
CONFIG_MBEDTLS_HEAP_SIZE=86880
# NCS v3.4.0 updated Mbed TLS to v4.1.0, which removed the legacy mbedcrypto
# APIs and the "legacy crypto config path" this app previously routed through.
# CONFIG_NRF_SECURITY is now a computed symbol (auto-enabled for Nordic SoCs)
# and CONFIG_MBEDTLS_LEGACY_CRYPTO_C no longer exists, so neither is set here.
# Unlike a first assessment suggested, this is NOT a no-op change: nrf_security's
# PSA-only config generation did not forward MBEDTLS_MEMORY_DEBUG into the
# generated psa/crypto_config.h, so mbedtls_memory_buffer_alloc_cur_get()/
# _max_get() were unavailable and the mbedtls_heap row was omitted from ZView.
# Fixed by a vendored patch carried in zego/patches/nrf_security/ (reapply
# after west update) - see bricks/memonitor/Kconfig for the resulting
# CONFIG_MBEDTLS_MEMORY_DEBUG auto-select logic.

