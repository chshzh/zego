# BLE Wi-Fi provisioning (zego/wifi_ble_prov module)
# Disabled per-board when flash budget is too tight (see boards/*.conf).
# Log levels only set in boards conf where the module is actually enabled,
# to avoid Kconfig "choice symbol selected but no selection" warnings.
# CONFIG_ZEGO_WIFI_BLE_PROV=y

# P2P_GC has no target-GO-MAC build option: the GO is paired at runtime via a
# Button 0 double-click (WPS PIN) and the learned MAC is stored in NVS.

# -------------------------------------------------------------------------
# Wi-Fi Configuration (STA + SoftAP + P2P)
# -------------------------------------------------------------------------
# WIFI / WIFI_NRF70 / WIFI_NM_WPA_SUPPLICANT: now unconditionally selected by
# ZEGO_NETWORK (zego/network's Kconfig) now that the ZEGO_NETWORK/ZEGO_WIFI/
# NETWORKING Kconfig cycle is fixed — verified via build (.config unchanged).
# CONFIG_WIFI=y
# CONFIG_WIFI_NRF70=y

# WPA supplicant — supports STA and SoftAP; add wifi-p2p snippet for P2P + WPS
# CONFIG_WIFI_NM_WPA_SUPPLICANT=y
CONFIG_WIFI_NM_WPA_SUPPLICANT_AP=y

# WEP and WPA1/TKIP (LEGACY_CRYPTO) are both cryptographically broken (WEP:
# full key recovery in minutes via aircrack-ng-class attacks; TKIP: Beck-Tews/
# Ohigashi-Morii partial plaintext recovery) and have been out of Wi-Fi
# Alliance certification since 2004 / 2012 respectively. WPA2-AES/CCMP has
# been mandatory in every certified AP since 2006, so a router with no WPA2
# fallback is effectively extinct — the compatibility cost of dropping both
# is negligible, and doing so removes an RC4/MD5 downgrade attack surface
# from this device's Wi-Fi stack entirely. This app only uses personal
# WPA2/WPA3-PSK (no enterprise/EAP), which doesn't touch either symbol.
CONFIG_WIFI_NM_WPA_SUPPLICANT_WEP=n
CONFIG_WIFI_NM_WPA_SUPPLICANT_LEGACY_CRYPTO=n

# nRF70 SoftAP mode
CONFIG_NRF70_AP_MODE=y
CONFIG_NRF_WIFI_LOW_POWER=n
# Limit SoftAP to 3 simultaneous clients (Zephyr default is 4)
CONFIG_WIFI_MGMT_AP_MAX_NUM_STA=3

# nRF70 P2P mode (Wi-Fi Direct) — not enabled here; add the wifi-p2p snippet
# (-Dnordic-wifi-app-template_SNIPPET=wifi-p2p) to enable it. The snippet sets
# CONFIG_NRF70_P2P_MODE=y, which in turn enables P2P_GO and P2P_GC as
# selectable Wi-Fi modes by default (ZEGO_WIFI_MODE_P2P_GO_ENABLED /
# _GC_ENABLED both default y when NRF70_P2P_MODE=y — see zego/bricks/wifi/Kconfig).

