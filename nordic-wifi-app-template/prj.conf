# ============================================================================
# Wi-Fi Configuration (STA + SoftAP + P2P)
# ============================================================================
CONFIG_WIFI=y
CONFIG_WIFI_NRF70=y

# WPA supplicant — supports STA and SoftAP; add wifi-p2p snippet for P2P + WPS
CONFIG_WIFI_NM_WPA_SUPPLICANT=y
CONFIG_WIFI_NM_WPA_SUPPLICANT_AP=y
# Watermark Bytes 5392/0.9=5991 (measured on nRF54LM20DK + nRF7002EB2)
CONFIG_WIFI_NM_WPA_SUPPLICANT_THREAD_STACK_SIZE=8192
# Watermark Bytes 3896/0.9=4328
CONFIG_WIFI_NM_WPA_SUPPLICANT_WQ_STACK_SIZE=4328

# nRF70 SoftAP mode
CONFIG_NRF70_AP_MODE=y
CONFIG_NRF_WIFI_LOW_POWER=n

# ============================================================================
# Shell — required for mode selector UX and wifi connect / wifi cred commands
# ============================================================================
CONFIG_SHELL=y
CONFIG_NET_L2_WIFI_SHELL=y
CONFIG_WIFI_SHELL_MAX_AP_STA=2
CONFIG_SHELL_STACK_SIZE=8192

# ============================================================================
# Networking
# ============================================================================
CONFIG_NETWORKING=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_IPV4=y
CONFIG_NET_UDP=y
CONFIG_NET_TCP=y
CONFIG_NET_IPV6=n

# DHCP Server (SoftAP / P2P_GO)
CONFIG_NET_DHCPV4=y
CONFIG_NET_DHCPV4_SERVER=y
CONFIG_NET_DHCPV4_SERVER_ADDR_COUNT=2
# Static IP for SoftAP / P2P_GO gateway
CONFIG_NET_CONFIG_SETTINGS=y
CONFIG_NET_CONFIG_MY_IPV4_ADDR="192.168.7.1"
CONFIG_NET_CONFIG_MY_IPV4_NETMASK="255.255.255.0"
CONFIG_NET_CONFIG_MY_IPV4_GW="192.168.7.1"
CONFIG_NET_CONFIG_INIT_TIMEOUT=0

# ============================================================================
# STA mode — Connection Manager + Wi-Fi Credentials
# ============================================================================
CONFIG_NET_CONNECTION_MANAGER=y
# Watermark Bytes 4432/0.9=4924
CONFIG_NET_CONNECTION_MANAGER_MONITOR_STACK_SIZE=4924
CONFIG_L2_WIFI_CONNECTIVITY=y
CONFIG_L2_WIFI_CONNECTIVITY_AUTO_CONNECT=n
CONFIG_L2_WIFI_CONNECTIVITY_AUTO_DOWN=n

# Persistent credential store — enables 'wifi cred' shell commands
CONFIG_WIFI_CREDENTIALS=y
CONFIG_WIFI_CREDENTIALS_BACKEND_SETTINGS=y
CONFIG_DNS_RESOLVER=y
CONFIG_DNS_RESOLVER_AUTO_INIT=y

# ============================================================================
# Mode Selector — NVS persistence (Flash / Settings / NVS)
# ============================================================================
CONFIG_SETTINGS=y
CONFIG_SETTINGS_NVS=y
CONFIG_NVS=y
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_FLASH_PAGE_LAYOUT=y

# ============================================================================
# Network buffers — tuned for reliable operation
# ============================================================================
# NET_BUF_FIXED_DATA_SIZE=y uses NET_BUF_POOL_FIXED_DEFINE (k_mem_slab) for
# rx/tx data buffers — zero fragmentation, O(1) alloc, but invisible to ZView.
# Leave unset (default VAR pool) to see net_buf_mem_pool_rx/tx_bufs in ZView.
CONFIG_NET_BUF_FIXED_DATA_SIZE=y
CONFIG_NET_PKT_RX_COUNT=16
CONFIG_NET_PKT_TX_COUNT=24
CONFIG_NET_BUF_RX_COUNT=16
CONFIG_NET_BUF_TX_COUNT=32
CONFIG_NRF70_RX_NUM_BUFS=16
CONFIG_NET_TC_TX_COUNT=1
CONFIG_NET_IF_UNICAST_IPV4_ADDR_COUNT=1
CONFIG_NET_MAX_CONTEXTS=16
CONFIG_NET_MAX_CONN=16
CONFIG_NET_CONTEXT_SYNC_RECV=y
CONFIG_NET_CONTEXT_RCVTIMEO=y
CONFIG_NET_L2_ETHERNET=y
CONFIG_NET_SOCKETS_POLL_MAX=10

# ============================================================================
# SMF + Zbus
# ============================================================================
CONFIG_SMF=y
CONFIG_SMF_INITIAL_TRANSITION=y
CONFIG_SMF_ANCESTOR_SUPPORT=y
CONFIG_ZBUS=y
CONFIG_ZBUS_PRIORITY_BOOST=y
CONFIG_ZBUS_RUNTIME_OBSERVERS=y
CONFIG_ZBUS_MSG_SUBSCRIBER=y

# ============================================================================
# GPIO / DK Library
# ============================================================================
CONFIG_GPIO=y
CONFIG_DK_LIBRARY=y

# ============================================================================
# JSON
# ============================================================================
CONFIG_JSON_LIBRARY=y

# ============================================================================
# Memory / Stack sizes
# ============================================================================
# All values measured on nRF54LM20DK + nRF7002EB2 using CONFIG_THREAD_ANALYZER.
# Sizing rule: max_hwm / 0.9 (10 % headroom). Adjust for your application load.
# ============================================================================
# Watermark Bytes 1496/0.9=1662 (WiFi reconnect + active uploads)
CONFIG_MAIN_STACK_SIZE=4096
# Watermark Bytes 4872/0.9=4988 (wpa_cli_cmd + _wpa_ctrl_command + zvfs_poll_internal)
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4988
# Watermark Bytes 1168/0.9=1297; kept at 2048 for network burst headroom
CONFIG_NET_RX_STACK_SIZE=2048
# Watermark Bytes 792/0.9=880; kept at 2048 for network burst headroom
CONFIG_NET_TX_STACK_SIZE=2048
# Watermark Bytes 2940/0.9=3266
CONFIG_NET_MGMT_EVENT_STACK_SIZE=3266
# Watermark Bytes 1088/0.9=1208
CONFIG_NRF70_BH_WQ_STACK_SIZE=1208
# Watermark Bytes 792/0.9=880
CONFIG_NRF70_IRQ_WQ_STACK_SIZE=880
# Watermark Bytes 248/0.9=276
CONFIG_L2_WIFI_CONN_WQ_STACK_SIZE=2760


# ============================================================================
# Heap
# ============================================================================
# CONFIG_HEAP_MEM_POOL_SIZE is the user floor. Kconfig enforces a minimum equal
# to the sum of all HEAP_MEM_POOL_ADD_SIZE_* values (~184 KB for Wi-Fi + BLE):
#   ADD_SIZE_NRF70=150000  ADD_SIZE_HOSTAP=30000  ADD_SIZE_BOARD=4096  ADD_SIZE_POSIX=256
# Setting a value below that sum is silently raised to the sum unless
# HEAP_MEM_POOL_IGNORE_MIN=y is set.
# Runtime measurements: _system_heap peaked at 57928 B (89 %) of the previous
# 64780 B ceiling in STA/SoftAP mode. P2P_GO adds ~6-8 KB more for struct
# p2p_data, the P2P GO's wpa_auth context, and the PMKSA cache (528 B).
# Without enough headroom, pmksa_cache_auth_init() returns NULL, causing
# "PMKSA cache initialization failed" + "WPA initialization failed" and a
# 15 s WPS_CHECK_PIN ctrl-iface timeout.
# New ceiling: 131072 B (20 % headroom above estimated P2P_GO peak of ~104 KB).
CONFIG_HEAP_MEM_POOL_SIZE=131072
CONFIG_HEAP_MEM_POOL_IGNORE_MIN=y
CONFIG_NRF_WIFI_GLOBAL_HEAP=y
CONFIG_WIFI_NM_WPA_SUPPLICANT_GLOBAL_HEAP=y
CONFIG_MBEDTLS_ENABLE_HEAP=y
# Watermark Bytes 69504/0.8=86880
CONFIG_MBEDTLS_HEAP_SIZE=86880

# ============================================================================
# System
# ============================================================================
CONFIG_REBOOT=y

# ============================================================================
# Debugging
# ============================================================================
# CONFIG_STACK_SENTINEL=y
CONFIG_DEBUG_COREDUMP=y
CONFIG_DEBUG_COREDUMP_BACKEND_LOGGING=y
CONFIG_DEBUG_COREDUMP_MEMORY_DUMP_MIN=y
CONFIG_SHELL_CMDS_RESIZE=n

# ============================================================================
# Kernel options
# ============================================================================
CONFIG_ENTROPY_GENERATOR=y
CONFIG_INIT_STACKS=y


# ============================================================================
# Eventfd — WPA supplicant needs more than 2
# ============================================================================
CONFIG_EVENTFD=y
CONFIG_ZVFS_OPEN_MAX=48
CONFIG_ZVFS_EVENTFD_MAX=16
CONFIG_POSIX_API=y

# ============================================================================
# Zego module configuration
# ============================================================================
CONFIG_ZEGO_BUTTON=y
CONFIG_ZEGO_LED=y

CONFIG_ZEGO_WIFI=y
# Default mode: STA — change to SOFTAP or P2P_GO via the mode-selector shell
CONFIG_ZEGO_WIFI_DEFAULT_MODE_STA=y
CONFIG_ZEGO_WIFI_LOG_LEVEL_INF=y

CONFIG_ZEGO_WIIF_SOFTAP_SSID="nRF7x_AP"
CONFIG_ZEGO_WIIF_SOFTAP_PASSWORD="12345678"

# BLE Wi-Fi provisioning (zego/wifi_ble_prov module)
# Disabled per-board when flash budget is too tight (see boards/*.conf).
# Log levels only set in boards conf where the module is actually enabled,
# to avoid Kconfig "choice symbol selected but no selection" warnings.
CONFIG_ZEGO_WIFI_BLE_PROV=y

#CONFIG_ZEGO_WIFI_P2P_CLIENT_TARGET_GO_MAC="F4:CE:36:00:00:00"

# ============================================================================
# P2P debug — enable wpa_supplicant MSG_DEBUG to see join_scan_count,
# "Failed to find BSS/GO", "Join scan attempt N", P2P state transitions.
# Very verbose: filter with 'grep P2P' in the terminal.
# Remove when debugging is done.
# ============================================================================
#CONFIG_WIFI_NM_WPA_SUPPLICANT_LOG_LEVEL_DBG=y

CONFIG_ZEGO_NETWORK=y
CONFIG_ZEGO_NETWORK_LOG_LEVEL_INF=y

# ============================================================================
# UX module — Button 0 gestures + LED 0 Wi-Fi state feedback
# ============================================================================
CONFIG_APP_UX_MODULE=y

# ============================================================================
# ZView monitoring
# ============================================================================
# Resource cost is negligible (<500 B RAM, <200 B Flash total) because:
#   - THREAD_MONITOR/STACK_INFO/NAME/RUNTIME_STATS default ON via CONFIG_SHELL
#     and networking Kconfig defaults — setting them here costs nothing extra.
#   - INIT_STACKS fills existing stack memory with 0xaa at boot; no extra RAM.
#   - SYS_HEAP_RUNTIME_STATS adds one uint32 peak field per heap (~32 B RAM)
#     and a compare-and-store path in sys_heap_alloc (~100 B Flash) — the only
#     genuinely additive config in this block.
# CONFIG_STACK_SENTINEL=n is mandatory: it overwrites the 0xaa init-fill with
# 0xf0f0f0f0, causing ZView to report 100% stack usage on every thread.
CONFIG_INIT_STACKS=y            # Required for stack watermarks
CONFIG_THREAD_MONITOR=y         # Required for thread discovery
CONFIG_THREAD_STACK_INFO=y      # Required for thread metadata

# Optional Features
CONFIG_THREAD_NAME=y            # Enables thread name display
CONFIG_THREAD_RUNTIME_STATS=y   # Enables CPU usage tracking
CONFIG_SYS_HEAP_RUNTIME_STATS=y # Enables heap peak / fragmentation map in ZView
CONFIG_STACK_SENTINEL=n

# ============================================================================
# Document versions — keep in sync with docs/pm-prd/PRD.md and
# docs/dev-specs/overview.md Changelog timestamps.
# ============================================================================
CONFIG_ZEGO_APP_PRD_VERSION="2026-06-16-11-26"
CONFIG_ZEGO_APP_SPECS_VERSION="2026-06-16-11-26"
