# nRF54L-M20 DK — 4 user LEDs (LED0..LED3, indices 0..3)
CONFIG_ZEGO_LED_NUM_LEDS=4
CONFIG_ZEGO_LED_BACKEND_DK=y
# To use the Zephyr LED driver backend (required for hardware-PWM breathe):
#   CONFIG_ZEGO_LED_BACKEND_ZEPHYR=y
#   CONFIG_ZEGO_LED_USE_PWM=y
#   CONFIG_ZEGO_LED_0_PWM_INDEX=-1  # LED0 → GPIO only, software PWM fallback
#   CONFIG_ZEGO_LED_1_PWM_INDEX=0   # LED1 → pwm-leds child index 0 (pwm_led_1)
#   CONFIG_ZEGO_LED_2_PWM_INDEX=-1  # LED2 → GPIO only
#   CONFIG_ZEGO_LED_3_PWM_INDEX=-1  # LED3 → GPIO only
