# Reusable composite action: install NCS toolchain and run west update.
# Kept minimal for Phase 1; extend as the concrete CI runner is decided.

name: NCS setup
description: Install nrfutil, NCS toolchain, and west-update the zego workspace.

runs:
  using: composite
  steps:
    - name: Install nrfutil
      shell: bash
      run: |
        pip install nrfutil
        nrfutil install toolchain-manager

    - name: Install NCS v3.2.4 toolchain
      shell: bash
      run: nrfutil toolchain-manager install --ncs-version v3.2.4

    - name: Initialize west workspace
      shell: bash
      run: |
        pip install west
        west init -l .
        west update --narrow -o=--depth=1
