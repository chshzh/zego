name: Build and Test Nordic Wi-Fi App Template

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

# Cancel any in-progress run for the same branch/PR to avoid wasting CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  set-version:
    runs-on: ubuntu-24.04
    outputs:
      NCS_VERSION: ${{ steps.extract-version.outputs.NCS_VERSION }}
      TOOLCHAIN_VERSION: ${{ steps.extract-version.outputs.TOOLCHAIN_VERSION }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          path: app-workspace/zego

      - name: Extract NCS version from west.yml
        id: extract-version
        working-directory: app-workspace/zego/nordic-wifi-app-template
        run: |
          NCS_VERSION=$(awk '
            $1=="-" && $2=="name:" && $3=="sdk-nrf" { in_sdk=1; next }
            in_sdk && $1=="revision:" { print $2; exit }
          ' west.yml)
          if [ -z "${NCS_VERSION}" ]; then
            echo "Failed to extract sdk-nrf revision from west.yml" >&2
            exit 1
          fi
          echo "NCS_VERSION=${NCS_VERSION}" >> $GITHUB_OUTPUT
          # Toolchain Docker image tag matches the NCS revision exactly.
          echo "TOOLCHAIN_VERSION=${NCS_VERSION}" >> $GITHUB_OUTPUT

  build-and-test:
    needs: set-version
    runs-on: ubuntu-24.04
    container: ghcr.io/nrfconnect/sdk-nrf-toolchain:${{ needs.set-version.outputs.TOOLCHAIN_VERSION }}
    defaults:
      run:
        shell: bash
    strategy:
      matrix:
        config:
          - name: "nRF54LM20DK + nRF7002EB2"
            build_dir: "build_nrf54lm20dk"
            board: "nrf54lm20dk/nrf54lm20a/cpuapp"
            cmake_args: "-Dnordic-wifi-app-template_SNIPPET=wifi-p2p -DSHIELD=nrf7002eb2"
          - name: "nRF7002DK"
            build_dir: "build_nrf7002dk"
            board: "nrf7002dk/nrf5340/cpuapp"
            cmake_args: "-Dnordic-wifi-app-template_SNIPPET=wifi-p2p"
          - name: "nRF5340 Audio DK + nRF7002EK"
            build_dir: "build_nrf5340_audio_dk"
            board: "nrf5340_audio_dk/nrf5340/cpuapp"
            cmake_args: "-Dnordic-wifi-app-template_SNIPPET=wifi-p2p -DSHIELD=nrf7002ek"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          path: app-workspace/zego

      - name: Cache west workspace
        uses: actions/cache@v4
        with:
          path: |
            app-workspace/nrf
            app-workspace/zephyr
            app-workspace/modules
            app-workspace/nrfxlib
            app-workspace/bootloader
          key: west-${{ needs.set-version.outputs.NCS_VERSION }}-${{ hashFiles('app-workspace/zego/nordic-wifi-app-template/west.yml') }}

      - name: Prepare west workspace
        working-directory: app-workspace
        run: |
          west init -l zego/nordic-wifi-app-template
          west update -o=--depth=1 -n

      - name: Build ${{ matrix.config.name }}
        working-directory: app-workspace/zego/nordic-wifi-app-template
        run: |
          BUILD_LOG="${{ matrix.config.build_dir }}/build.log"
          EXTRA_ARGS="${{ matrix.config.cmake_args }}"

          # Inject firmware version: git tag on tag pushes, "dev" otherwise.
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            FW_VERSION="${{ github.ref_name }}"
          else
            FW_VERSION="dev"
          fi
          EXTRA_ARGS="$EXTRA_ARGS -DAPP_VERSION_STRING=${FW_VERSION}"

          mkdir -p "${{ matrix.config.build_dir }}"
          set -o pipefail
          west build -p -b ${{ matrix.config.board }} -d ${{ matrix.config.build_dir }} -- \
            $EXTRA_ARGS 2>&1 | tee "$BUILD_LOG"

      - name: Extract memory usage for ${{ matrix.config.name }}
        if: always()
        working-directory: app-workspace/zego/nordic-wifi-app-template
        run: |
          BUILD_LOG="${{ matrix.config.build_dir }}/build.log"
          USAGE_SUMMARY="${{ matrix.config.build_dir }}/usage-summary.txt"

          if [ -f "$BUILD_LOG" ]; then
            ROM_USAGE="$(awk '/^[[:space:]]*FLASH:/ {print $2 " " $3 " / " $4 " " $5 " (" $6 ")"}' "$BUILD_LOG" | tail -n 1)"
            RAM_USAGE="$(awk '/^[[:space:]]*RAM:/ {print $2 " " $3 " / " $4 " " $5 " (" $6 ")"}' "$BUILD_LOG" | tail -n 1)"
          else
            ROM_USAGE="n/a"
            RAM_USAGE="n/a"
          fi

          : "${ROM_USAGE:=n/a}"
          : "${RAM_USAGE:=n/a}"

          {
            echo "ROM_USAGE=$ROM_USAGE"
            echo "RAM_USAGE=$RAM_USAGE"
          } > "$USAGE_SUMMARY"

          echo "ROM usage: $ROM_USAGE"
          echo "RAM usage: $RAM_USAGE"

      - name: Capture size report for ${{ matrix.config.name }}
        if: always()
        working-directory: app-workspace/zego/nordic-wifi-app-template
        run: |
          ELF_PATH="${{ matrix.config.build_dir }}/nordic-wifi-app-template/zephyr/zephyr.elf"
          SIZE_REPORT="${{ matrix.config.build_dir }}/size-report.txt"
          SIZE_TOOL="$(command -v arm-zephyr-eabi-size || command -v llvm-size || command -v size)"

          echo "ELF: ${ELF_PATH}" > "$SIZE_REPORT"
          echo "Tool: ${SIZE_TOOL}" >> "$SIZE_REPORT"
          echo >> "$SIZE_REPORT"

          if [ -f "$ELF_PATH" ] && [ -n "$SIZE_TOOL" ]; then
            "$SIZE_TOOL" "$ELF_PATH" >> "$SIZE_REPORT"
          else
            echo "size data unavailable" >> "$SIZE_REPORT"
          fi

          echo "Generated size report: $SIZE_REPORT"

      - name: Create merged hex for ${{ matrix.config.name }}
        if: always()
        working-directory: app-workspace/zego/nordic-wifi-app-template
        run: |
          BUILD_DIR="${{ matrix.config.build_dir }}"
          MERGED_HEX="${BUILD_DIR}/merged.hex"

          if [ -f "${MERGED_HEX}" ]; then
            echo "merged.hex already exists"
          else
            echo "merged.hex not found, attempting to assemble from mcuboot + signed app..."
            MCUBOOT_HEX="${BUILD_DIR}/mcuboot/zephyr/zephyr.hex"
            APP_HEX="${BUILD_DIR}/nordic-wifi-app-template/zephyr/zephyr.signed.hex"

            if [ -f "${MCUBOOT_HEX}" ] && [ -f "${APP_HEX}" ]; then
              python3 -c "
import sys
from intelhex import IntelHex
ih = IntelHex(); ih.loadhex(sys.argv[1])
app = IntelHex(); app.loadhex(sys.argv[2])
ih.merge(app, overlap='replace')
ih.write_hex_file(sys.argv[3])
print('merged.hex created successfully')
" "${MCUBOOT_HEX}" "${APP_HEX}" "${MERGED_HEX}"
            else
              PLAIN_HEX="${BUILD_DIR}/nordic-wifi-app-template/zephyr/zephyr.hex"
              if [ -f "${PLAIN_HEX}" ]; then
                echo "No MCUboot image found, using plain zephyr.hex as release artifact"
                cp "${PLAIN_HEX}" "${MERGED_HEX}"
              else
                echo "Warning: no flashable hex found"
                [ -f "${MCUBOOT_HEX}" ] || echo "  Missing: ${MCUBOOT_HEX}"
                [ -f "${APP_HEX}" ]     || echo "  Missing: ${APP_HEX}"
                [ -f "${PLAIN_HEX}" ]   || echo "  Missing: ${PLAIN_HEX}"
              fi
            fi
          fi

      - name: Stage artifacts for ${{ matrix.config.name }}
        if: always()
        working-directory: app-workspace/zego/nordic-wifi-app-template
        run: |
          STAGE="artifact-staging-${{ matrix.config.build_dir }}"
          mkdir -p "$STAGE"
          for f in merged.hex build.log usage-summary.txt size-report.txt; do
            cp "${{ matrix.config.build_dir }}/$f" "$STAGE/" 2>/dev/null || true
          done

      - name: Upload artifacts for ${{ matrix.config.name }}
        if: always()
        uses: actions/upload-artifact@v4
        with:
          if-no-files-found: warn
          name: build-${{ matrix.config.build_dir }}
          path: app-workspace/zego/nordic-wifi-app-template/artifact-staging-${{ matrix.config.build_dir }}/

  static-analysis:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch Zephyr checkpatch
        run: |
          git clone --depth=1 https://github.com/zephyrproject-rtos/zephyr.git /tmp/zephyr
          chmod +x /tmp/zephyr/scripts/checkpatch.pl

      - name: Run Zephyr checkpatch
        run: |
          echo "Running Zephyr checkpatch on source files..."

          if git rev-parse --verify HEAD~1 >/dev/null 2>&1; then
            git diff HEAD~1 | /tmp/zephyr/scripts/checkpatch.pl --no-tree -
          else
            echo "Single commit detected, checking all source files..."
            if [ -d nordic-wifi-app-template/src/ ]; then
              find nordic-wifi-app-template/src/ \( -name "*.c" -o -name "*.h" \) | while read -r file; do
                echo "Checking $file..."
                /tmp/zephyr/scripts/checkpatch.pl --no-tree --file "$file" || true
              done
            fi
          fi

          echo "Checkpatch analysis completed ✓"

  create-release:
    needs: [set-version, build-and-test, static-analysis]
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: app-workspace/zego

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate release notes
        id: release-notes
        working-directory: app-workspace/zego
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [ -z "$PREV_TAG" ]; then
            echo "First release - no previous tag found"
            CHANGELOG="Initial release of Nordic Wi-Fi App Template"
          else
            echo "Generating changelog from $PREV_TAG to ${{ github.ref_name }}"
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" ${PREV_TAG}..HEAD)
          fi

          echo "$CHANGELOG" > /tmp/changelog.txt
          echo "PREV_TAG=$PREV_TAG" >> $GITHUB_OUTPUT

      - name: Prepare release body
        run: |
          read_usage() {
            local file="$1"
            local key="$2"
            grep "^${key}=" "$file" 2>/dev/null | cut -d= -f2-
          }

          NRF54LM20_USAGE_FILE="artifacts/build-build_nrf54lm20dk/usage-summary.txt"
          NRF7002DK_USAGE_FILE="artifacts/build-build_nrf7002dk/usage-summary.txt"
          NRF5340_AUDIO_USAGE_FILE="artifacts/build-build_nrf5340_audio_dk/usage-summary.txt"

          NRF54LM20_ROM="$(read_usage "$NRF54LM20_USAGE_FILE" ROM_USAGE)"
          NRF54LM20_RAM="$(read_usage "$NRF54LM20_USAGE_FILE" RAM_USAGE)"
          NRF7002DK_ROM="$(read_usage "$NRF7002DK_USAGE_FILE" ROM_USAGE)"
          NRF7002DK_RAM="$(read_usage "$NRF7002DK_USAGE_FILE" RAM_USAGE)"
          NRF5340_AUDIO_ROM="$(read_usage "$NRF5340_AUDIO_USAGE_FILE" ROM_USAGE)"
          NRF5340_AUDIO_RAM="$(read_usage "$NRF5340_AUDIO_USAGE_FILE" RAM_USAGE)"

          : "${NRF54LM20_ROM:=n/a}"
          : "${NRF54LM20_RAM:=n/a}"
          : "${NRF7002DK_ROM:=n/a}"
          : "${NRF7002DK_RAM:=n/a}"
          : "${NRF5340_AUDIO_ROM:=n/a}"
          : "${NRF5340_AUDIO_RAM:=n/a}"

          cat > /tmp/release-body.txt <<RELEASE_EOF
          ## Nordic Wi-Fi App Template Release ${{ github.ref_name }}

          > Built with NCS ${{ needs.set-version.outputs.NCS_VERSION }}

          ### Firmware Files

          | Board | File | ROM Usage | RAM Usage |
          |-------|------|-----------|-----------|
          | nRF54LM20DK + nRF7002EB2 | [nordic-wifi-app-template-nrf54lm20dk-nrf7002eb2-${{ github.ref_name }}.hex](https://github.com/chshzh/zego/releases/download/${{ github.ref_name }}/nordic-wifi-app-template-nrf54lm20dk-nrf7002eb2-${{ github.ref_name }}.hex) | ${NRF54LM20_ROM} | ${NRF54LM20_RAM} |
          | nRF7002DK | [nordic-wifi-app-template-nrf7002dk-${{ github.ref_name }}.hex](https://github.com/chshzh/zego/releases/download/${{ github.ref_name }}/nordic-wifi-app-template-nrf7002dk-${{ github.ref_name }}.hex) | ${NRF7002DK_ROM} | ${NRF7002DK_RAM} |
          | nRF5340 Audio DK + nRF7002EK | [nordic-wifi-app-template-nrf5340-audio-dk-nrf7002ek-${{ github.ref_name }}.hex](https://github.com/chshzh/zego/releases/download/${{ github.ref_name }}/nordic-wifi-app-template-nrf5340-audio-dk-nrf7002ek-${{ github.ref_name }}.hex) | ${NRF5340_AUDIO_ROM} | ${NRF5340_AUDIO_RAM} |

          For flashing instructions see the [README](https://github.com/chshzh/zego/blob/main/nordic-wifi-app-template/README.md#build--flash).

          ### Changes Since Last Release

          RELEASE_EOF

          if [ -f /tmp/changelog.txt ]; then
            cat /tmp/changelog.txt >> /tmp/release-body.txt
          else
            echo "Initial release" >> /tmp/release-body.txt
          fi

      - name: Create release package
        run: |
          mkdir -p release-package

          if [ -f "artifacts/build-build_nrf54lm20dk/merged.hex" ]; then
            cp "artifacts/build-build_nrf54lm20dk/merged.hex" \
               "release-package/nordic-wifi-app-template-nrf54lm20dk-nrf7002eb2-${{ github.ref_name }}.hex"
          fi

          if [ -f "artifacts/build-build_nrf7002dk/merged.hex" ]; then
            cp "artifacts/build-build_nrf7002dk/merged.hex" \
               "release-package/nordic-wifi-app-template-nrf7002dk-${{ github.ref_name }}.hex"
          fi

          if [ -f "artifacts/build-build_nrf5340_audio_dk/merged.hex" ]; then
            cp "artifacts/build-build_nrf5340_audio_dk/merged.hex" \
               "release-package/nordic-wifi-app-template-nrf5340-audio-dk-nrf7002ek-${{ github.ref_name }}.hex"
          fi

          HEX_COUNT=$(find release-package -name "*.hex" | wc -l)
          if [ "$HEX_COUNT" -gt 0 ]; then
            cd release-package
            zip -r "../nordic-wifi-app-template-firmware-${{ github.ref_name }}.zip" .
            cd ..
            echo "Created zip with $HEX_COUNT hex file(s)"
          else
            echo "Warning: no merged hex files found in artifacts, skipping zip"
          fi

          ls -la release-package/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Nordic Wi-Fi App Template ${{ github.ref_name }}"
          body_path: /tmp/release-body.txt
          files: |
            release-package/*.hex
            nordic-wifi-app-template-firmware-*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
