# Zego CI — matrix build workflow
#
# Trigger rules (path-based):
#   • Changes under applications/<app>/**  → build that app's board matrix only
#   • Changes under modules/**, utils/**, .github/**, or root files → build ALL apps
#   • Tag push matching <app>/v*  → build + publish artifacts for that app only
#
# NCS toolchain is installed on the runner via nrfutil; west is available in PATH.

name: CI

on:
  push:
    branches: [main]
    tags:
      - 'nordic-wifi-memfault/v*'
      - 'nordic-wifi-webdash/v*'
      - 'nordic-wifi-audio/v*'
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────────────────────────
  # Determine which apps need to be built based on changed paths
  # ─────────────────────────────────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      memfault: ${{ steps.filter.outputs.memfault }}
      webdash:  ${{ steps.filter.outputs.webdash }}
      audio:    ${{ steps.filter.outputs.audio }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            shared:
              - 'modules/**'
              - 'utils/**'
              - '.github/**'
              - 'west.yml'
            memfault:
              - 'shared'
              - 'applications/nordic-wifi-memfault/**'
            webdash:
              - 'shared'
              - 'applications/nordic-wifi-webdash/**'
            audio:
              - 'shared'
              - 'applications/nordic-wifi-audio/**'

  # ─────────────────────────────────────────────────────────────────
  # Build: nordic-wifi-memfault
  # ─────────────────────────────────────────────────────────────────
  build-memfault:
    needs: changes
    if: needs.changes.outputs.memfault == 'true' || startsWith(github.ref, 'refs/tags/nordic-wifi-memfault/')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - board: nrf7002dk/nrf5340/cpuapp
            extra: -DOVERLAY_CONFIG=overlay-app-memfault-project-info.conf
          - board: nrf54lm20dk/nrf54lm20a/cpuapp
            extra: -DSHIELD=nrf7002eb2
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/ncs-setup
      - name: Build memfault (${{ matrix.board }})
        run: |
          west build -b ${{ matrix.board }} applications/nordic-wifi-memfault \
            -- ${{ matrix.extra }}
      - uses: actions/upload-artifact@v4
        if: startsWith(github.ref, 'refs/tags/nordic-wifi-memfault/')
        with:
          name: memfault-${{ matrix.board == 'nrf7002dk/nrf5340/cpuapp' && 'nrf7002dk' || 'nrf54lm20' }}
          path: build/zephyr/zephyr.hex

  # ─────────────────────────────────────────────────────────────────
  # Build: nordic-wifi-webdash
  # ─────────────────────────────────────────────────────────────────
  build-webdash:
    needs: changes
    if: needs.changes.outputs.webdash == 'true' || startsWith(github.ref, 'refs/tags/nordic-wifi-webdash/')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - board: nrf7002dk/nrf5340/cpuapp
            extra: -DSNIPPET=wifi-p2p
          - board: nrf54lm20dk/nrf54lm20a/cpuapp
            extra: -DSNIPPET=wifi-p2p -DSHIELD=nrf7002eb2
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/ncs-setup
      - name: Build webdash (${{ matrix.board }})
        run: |
          west build -b ${{ matrix.board }} applications/nordic-wifi-webdash \
            -- ${{ matrix.extra }}
      - uses: actions/upload-artifact@v4
        if: startsWith(github.ref, 'refs/tags/nordic-wifi-webdash/')
        with:
          name: webdash-${{ matrix.board == 'nrf7002dk/nrf5340/cpuapp' && 'nrf7002dk' || 'nrf54lm20' }}
          path: build/zephyr/zephyr.hex

  # ─────────────────────────────────────────────────────────────────
  # Build: nordic-wifi-audio
  # ─────────────────────────────────────────────────────────────────
  build-audio:
    needs: changes
    if: needs.changes.outputs.audio == 'true' || startsWith(github.ref, 'refs/tags/nordic-wifi-audio/')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - board: nrf7002dk/nrf5340/cpuapp
            extra: ""
          - board: nrf54lm20dk/nrf54lm20a/cpuapp
            extra: -DSHIELD=nrf7002eb2
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/ncs-setup
      - name: Build audio (${{ matrix.board }})
        run: |
          west build -b ${{ matrix.board }} applications/nordic-wifi-audio \
            -- ${{ matrix.extra }}
      - uses: actions/upload-artifact@v4
        if: startsWith(github.ref, 'refs/tags/nordic-wifi-audio/')
        with:
          name: audio-${{ matrix.board == 'nrf7002dk/nrf5340/cpuapp' && 'nrf7002dk' || 'nrf54lm20' }}
          path: build/zephyr/zephyr.hex
